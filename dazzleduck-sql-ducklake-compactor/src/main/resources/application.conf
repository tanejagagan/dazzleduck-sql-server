dazzleduck_sql_compaction {
  # List of DuckLake catalog names (must be attached via startup_script)
  databases = []

  # How often to run minor compaction
  minor_compaction_frequency = 1 minute

  # How often to run major compaction
  major_compaction_frequency = 1 hour

  # Only compact files smaller than this size (supports KB, MB, GB suffixes)
  minor_compaction_max_size = 8MB

  # Only compact files smaller than this size
  major_compaction_max_size = 64MB

  # How often to run housekeeping: expire old snapshots and delete orphaned S3 files.
  # Decoupled from compaction so S3 cleanup happens frequently without forcing a full merge.
  housekeeping_frequency = 5 minutes

  # Snapshots and files older than this are expired and deleted during housekeeping
  snapshot_retention = 15 minutes

  # Port for the embedded health check HTTP server (GET /health)
  health_port = 8080

  # SQL executed once on startup (use to ATTACH databases, load extensions, etc.)
  # Supports any StartupScriptProvider via the 'class' key (default: ConfigBasedStartupScriptProvider).
  startup_script_provider {
    # class = io.dazzleduck.sql.flight.LocalStartupConfigProvider
    # script_location = "/config/startup.sql"
    # content = "ATTACH '...' AS mydb (DATA_PATH '...');"
  }
}

 dazzleduck_server = {
    flight_sql = {
        port = 59307
        host = "0.0.0.0"
        use_encryption = true
        # List of data processor locations advertised to clients.
        # Defaults to the server's own location. Override to point to dedicated worker nodes.
        data_processor_locations = [
            { host = ${dazzleduck_server.flight_sql.host}, port = ${dazzleduck_server.flight_sql.port}, use_encryption = ${dazzleduck_server.flight_sql.use_encryption} }
        ]
    }

#    http = {
#       port = 8081
#        host = "0.0.0.0"
#       authentication = "none"
#    }

    keystore = "security/server0.key"
    server_cert = "security/server0.pem"
    secret_key = "VGhpcyBpcyBhIDY0IGJpdCBsb25nIGtleSB3aGljaCBzaG91bGQgYmUgY2hhbmdlZCBpbiBwcm9kdWN0aW9uLiBTbyBjaGFuZ2UgbWUgYW5kIG1ha2Ugc3VyZSBpdHMgMTI4IGJpdCBsb25nIG9yIG1vcmU"
    producer_id = "dazzleduck-flight-server"
    temp_write_location = "/tmp/dazzleduck-writes"
    warehouse = ${user.dir}"/warehouse"

    # Maximum time in milliseconds a query can run before being automatically cancelled
    query_timeout_ms = 120000 // 2 minutes

    ingestion = {
        min_bucket_size = 1048576 // 1MB
        max_bucket_size = 1073741824 // 1GB
        max_batches = 2048
        max_pending_write = 268435456 // 256 MB
        max_delay_ms = 2000 // 2 sec
    }
    users = [{
        username = admin
        password = admin
        groups = [admin, general]
    }]
    jwt_token = {
        expiration = 60m
        claims.generate.headers = [database,schema,table,filter,path,function,access-type]
        claims.validate.headers = []
        generation = true
    }

    # Uncomment this  if you want jwt token generation and user/password validation done by external login server
    # This will start proxy all the login/authentication requests to this url
    #login_url = "http://localhost:8080/login"

    # values COMPLETE, RESTRICTED
    access_mode = COMPLETE

    startup_script_provider = {
        class = "io.dazzleduck.sql.flight.ConfigBasedStartupScriptProvider"
        content = """
        INSTALL arrow FROM community;
        load arrow;
        """
        # location of the file. If both content and location is provided then content and location are appended to each  other
        # script_location = "/path/to/file.sql"
    }

    # ingestion_task_factory_provider controls what happens after each batch is written.
    #
    # Two implementations are available:
    #
    #   NOOPIngestionTaskFactoryProvider  (default)
    #     Writes Parquet files to disk under ingestion_path/<queue-id>/.
    #     No catalog registration is performed.
    #
    #   DuckLakeIngestionTaskFactoryProvider
    #     Writes Parquet files to the DuckLake table data path and registers
    #     each new file with the DuckLake catalog so it becomes queryable immediately.
    #     Requires ingestion_queue_table_mapping to map queue IDs to catalog tables.

    ingestion_task_factory_provider {
        class = io.dazzleduck.sql.commons.ingestion.NOOPIngestionTaskFactoryProvider

        # Root directory where ingested Parquet files are written.
        # Files land at: <ingestion_path>/<queue-id>/<uuid>.parquet
        ingestion_path = ${user.dir}"/warehouse/ingestion"
    }

    # ---- DuckLake provider (uncomment to enable) ----
    #
    # ingestion_task_factory_provider {
    #   class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
    #
    #   # Maps each ingestion queue to a target DuckLake table.
    #   # Every entry must have: ingestion_queue, catalog, schema, table.
    #   ingestion_queue_table_mapping = [
    #     {
    #       # Queue identifier sent by the producer in the ingestion_queue header.
    #       ingestion_queue = "log"
    #
    #       # DuckLake catalog / schema / table that owns the data.
    #       catalog = "loglake"
    #       schema  = "main"
    #       table   = "log"
    #
    #       # Optional: SQL transformation applied to every batch before it is written.
    #       #
    #       # Write a full SELECT statement that references the placeholder table __this.
    #       # At write time the server expands it to:
    #       #
    #       #   WITH __this AS (SELECT * FROM read_parquet([...]) ORDER BY ...)
    #       #   <transformation>
    #       #
    #       # Use cases:
    #       #   - select a subset of columns
    #       #   - rename or cast columns
    #       #   - add derived / enrichment columns
    #       #   - filter rows before persistence
    #       #
    #       # Examples:
    #       #   transformation = "SELECT * FROM __this"                              # no-op (same as omitting)
    #       #   transformation = "SELECT id, ts, msg FROM __this"                   # column subset
    #       #   transformation = "SELECT *, upper(level) AS level FROM __this"      # derived column
    #       #   transformation = "SELECT * FROM __this WHERE level != 'DEBUG'"      # row filter
    #       transformation = "SELECT id, ts, msg, current_timestamp AS ingested_at FROM __this"
    #
    #       # Optional: extra key/value pairs forwarded to the post-ingestion task.
    #       additional_parameters = {
    #         key1 = "value1"
    #       }
    #     },
    #     {
    #       ingestion_queue = "metric"
    #       catalog = "loglake"
    #       schema  = "main"
    #       table   = "metric"
    #       # transformation omitted — all columns written as-is
    #     }
    #   ]
    # }




    query_optimizer_provider = {
           class = io.dazzleduck.sql.flight.optimizer.QueryOptimizerProvider
    }
}
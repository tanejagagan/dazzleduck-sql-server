otel_collector {
    grpc_port = 4317

    # SQL executed once on startup (on the singleton DuckDB connection).
    # 'content'         — inline SQL, executed first.
    # 'script_location' — path to a .sql file, appended after content.
    startup_script_provider {
        content = """
        INSTALL arrow FROM community;
        LOAD arrow;
        """
        # script_location = "/path/to/startup.sql"
    }

    # -------------------------------------------------------------------------
    # Queue tuning — shared across all signal writers (logs, traces, metrics).
    # Mirror of the flight module's ingestion block.
    # -------------------------------------------------------------------------
    ingestion {
        min_bucket_size              = 1048576   # 1 MB — flush when accumulated Arrow bytes reach this
        max_delay_ms                 = 5000      # flush after this many ms even if below min_bucket_size
        queue_config_refresh_delay_ms = 120000   # how often DuckLakeIngestionHandler refreshes state
    }

    # -------------------------------------------------------------------------
    # Ingestion configuration — one entry per signal.
    # Each entry sets the local output path and optional otel-specific settings.
    # When 'class' is set, Parquet files are also registered in DuckLake.
    # -------------------------------------------------------------------------
    ingestion_task_factory_provider {
        # class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
        # queue_config_refresh_delay_ms = 120000

        ingestion_queue_table_mapping = [
            {
                ingestion_queue = "logs"
                output_path     = "./otel-logs"
                # transformation  = "CAST(timestamp AS DATE) AS date, severity_text AS level"
                # min_bucket_size = 1048576
                # max_delay_ms    = 5000
                # DuckLake fields (required when class is set):
                # catalog = "my_catalog"
                # schema  = "main"
                # table   = "logs"
            }
            {
                ingestion_queue = "traces"
                output_path     = "./otel-traces"
                partition_by    = []
                # DuckLake fields:
                # catalog = "my_catalog"
                # schema  = "main"
                # table   = "spans"
            }
            {
                ingestion_queue = "metrics"
                output_path     = "./otel-metrics"
                partition_by    = []
                # DuckLake fields:
                # catalog = "my_catalog"
                # schema  = "main"
                # table   = "metrics"
            }
        ]
    }

    # Authentication — only "jwt" is supported. Every request must carry a signed Bearer token.
    authentication = "jwt"

    # JWT token settings.
    jwt_token {
        # Set to false to skip signature verification — useful in development/testing
        # when tokens are issued by an external provider without sharing the secret key.
        # WARNING: disabling signature verification in production allows forged tokens.
        verify_signature = true
    }

    # Every OTLP export RPC must include the x-dd-ingestion-queue claim in the JWT.
    # The claim value must match one of the ingestion_queue values in ingestion_queue_table_mapping.
    # There is no default fallback — requests without the claim are rejected with INVALID_ARGUMENT.

    # Base64-encoded HMAC secret key. Required when authentication = "jwt".
    # Change this in production!
    secret_key = "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS1hdC1sZWFzdC02NC1ieXRlcy1sb25nISE="

    # Optional: delegate login to an external HTTP service.
    # When set, Basic auth credentials are forwarded to this URL (POST with {username, password}).
    # The response must be a JSON object with accessToken and tokenType fields.
    # If not set, users are validated locally against the users list below.
    # login_url = "http://localhost:8081/v1/login"

    # Users allowed to authenticate with username/password (Basic auth).
    # On successful login a JWT is generated and returned in the response Authorization header.
    # Subsequent requests should use: Authorization: Bearer <token>
    users = [
      { username = admin, password = admin }
    ]

    # JWT token expiration duration (e.g. 60m, 8h, 1d). Default: 1h
    # jwt_token.expiration = 1h

    # Service name reported in Micrometer metrics. Default: "open-telemetry-collector"
    # service_name = "my-collector"

    # Deprecated: use output_path within ingestion_task_factory_provider.ingestion_queue_table_mapping
    # log_ingestion    { output_path = "./otel-logs" }
    # trace_ingestion  { output_path = "./otel-traces" }
    # metric_ingestion { output_path = "./otel-metrics" }
}

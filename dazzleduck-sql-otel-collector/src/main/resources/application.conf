otel_collector {
    grpc_port = 4317
    logs_output_path = "./otel-logs"
    traces_output_path = "./otel-traces"
    metrics_output_path = "./otel-metrics"

    # SQL executed once on startup (on the singleton DuckDB connection).
    # Installs the Arrow extension required for reading temp Arrow files via read_arrow().
    # Override to "" to skip, or append additional SQL separated by semicolons.
    startup_script = "INSTALL arrow FROM community; LOAD arrow;"

    ingestion {
        # Minimum total Arrow file size (bytes) before accumulated batches are written to Parquet.
        # Default: 1 MB. The write also triggers after max_delay_ms elapses.
        min_bucket_size = 1048576

        # Maximum delay (ms) before flushing accumulated batches to Parquet, even if min_bucket_size is not reached.
        max_delay_ms = 5000
    }

    # Columns to partition the Parquet output by.
    # Example: partition_by = ["date"]
    # Pair with transformations to derive the column:
    #   transformations = "cast(timestamp as date) as date"
    partition_by = []

    # Optional SQL expressions appended as SELECT *, <transformations>
    # before the COPY command. Null means no transformations.
    # transformations = "cast(timestamp as date) as date"

    # Authentication mode: "jwt" (required)
    authentication = "jwt"

    # Base64-encoded HMAC secret key. Required when authentication = "jwt".
    # Change this in production!
    secret_key = "Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS1hdC1sZWFzdC02NC1ieXRlcy1sb25nISE="

    # Optional: delegate login to an external HTTP service.
    # When set, Basic auth credentials are forwarded to this URL (POST with {username, password}).
    # The response must be a JSON object with accessToken and tokenType fields.
    # If not set, users are validated locally against the users list below.
    # login_url = "http://localhost:8081/v1/login"

    # Users allowed to authenticate with username/password (Basic auth).
    # On successful login a JWT is generated and returned in the response Authorization header.
    # Subsequent requests should use: Authorization: Bearer <token>
    users = [
      { username = admin, password = admin }
    ]

    # JWT token expiration duration (e.g. 60m, 8h, 1d). Default: 1h
    # jwt_token.expiration = 1h

    # Service name reported in Micrometer metrics. Default: "open-telemetry-collector"
    # service_name = "my-collector"

    # Optional: register written Parquet files into a DuckLake catalog via HOCON.
    # log_ingestion_task_factory_provider {
    #     class = "io.dazzleduck.sql.commons.ingestion.DuckLakeIngestionTaskFactoryProvider"
    #     catalog = "my_catalog"
    #     mappings = [
    #         { queue = "logs",    table = "my_catalog.logs" }
    #         { queue = "traces",  table = "my_catalog.spans" }
    #         { queue = "metrics", table = "my_catalog.metrics" }
    #     ]
    # }
}
